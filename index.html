      export default function EventListenerSync() {
        const [windowWidth, setWindowWidth] = useState(window.innerWidth);

        useEffect(() => {
          // 1. Sync Action: Fire listener registration on component load
          const handleResize = () => setWindowWidth(window.innerWidth);

              const response = await fetch(\`https://jsonplaceholder.typicode.com/users/\${userId}\`, {

      function Module7Demo() {
        const [userProfile, setUserProfile] = useState(null);
        const [userId, setUserId] = useState(1);

        useEffect(() => {
          const controller = new AbortController();

          async function loadData() {
            try {
              setUserProfile(null);
              const response = await fetch(
                `https://jsonplaceholder.typicode.com/users/${userId}`,
                {
                  signal: controller.signal,
                },
              );
              const data = await response.json();
              setUserProfile(data);
            } catch (err) {
              if (err.name !== "AbortError") {
                console.error("Fetch cancellation failed:", err);
              }
            }
          }

          loadData();
          return () => controller.abort();
        }, [userId]);

        return (
          <div className="p-6 bg-slate-900 border border-slate-800 rounded-xl">

                    <button
                      onClick={handleCopyToClipboard}
                      className={`px-3 py-1.5 rounded text-[11px] font-bold flex items-center gap-1.5 transition-all ${copied ? "bg-emerald-600/20 text-emerald-400 border border-emerald-500/20" : "bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300"}`}
                    >
                      {copied ? (
                        <>
                          <i className="fa-solid fa-check"></i> Copied!
                        </>
                      ) : (
                        <>
                          <i className="fa-solid fa-copy"></i> Copy
                        </>
                      )}
                    </button>
                  </div>

                  {/* The key is the 'language-jsx' class on the code block */}
                  <div className="flex-grow overflow-auto p-4 bg-[#070a13]">
                    <pre className="language-jsx">
                      <code className="language-jsx">
                        {codeTemplates[selectedModule]}
                      </code>
                    </pre>
                  </div>
                </section>

                {/* Right Side: Live Playground */}
                <section className="flex-1 border-r border-slate-900 p-8 flex flex-col overflow-y-auto">
                  <div className="mb-6">
                    <span className="text-[10px] font-bold tracking-widest text-indigo-400 font-mono uppercase bg-indigo-500/10 border border-indigo-500/10 px-2.5 py-1 rounded-full">
                      {activeMod.session} • Concept Module
                    </span>
                    <h2 className="text-xl font-bold text-white mt-3 flex items-center gap-2">
                      <i
                        className={`fa-solid ${activeMod.icon} text-slate-400`}
                      ></i>
                      {activeMod.title}
                    </h2>
                    <p className="text-xs text-slate-400 mt-1">
                      Simulate component behavior in real-time inside this
                      rendering container.
                    </p>
                  </div>

                  {/* Active Component Inject Loop */}
                  <div className="flex-grow flex items-center justify-center bg-[#070a13] rounded-2xl border border-slate-800 p-8 shadow-inner min-h-[350px]">
                    <div className="w-full max-w-md">
                      {renderDemoComponent()}
                    </div>
                  </div>
                </section>
              </main>
            </div>
          </div>
        );
      }

      // Mount React execution frame directly to visual container root
      const rootElement = document.getElementById("root");
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    </script>
  </body>
</html>
